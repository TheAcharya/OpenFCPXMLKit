name: build

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'Docs/**'       # Docs folder in root of repo
      - '**/*.md'       # .md files anywhere in the repo
      - '**/LICENSE'    # LICENSE files anywhere in the repo
      - '**/.gitignore' # .gitignore files anywhere in the repo
      - '**/*.cursorrules'  # .cursorrules files anywhere in the repo
      - '**/.cursorrules'   # .cursorrules files anywhere in the repo
      
  pull_request:
    branches: [main]
    paths-ignore:
      - 'Docs/**'       # Docs folder in root of repo
      - '**/*.md'       # .md files anywhere in the repo
      - '**/LICENSE'    # LICENSE files anywhere in the repo
      - '**/.gitignore' # .gitignore files anywhere in the repo
      
  workflow_dispatch:
    
  schedule:
    - cron: '0 0 * * *'     # Runs at 8 AM Singapore time (00:00 UTC) every day

env:
  SCHEME: "OpenFCPXMLKit-Package"
  WORKSPACEPATH: ".swiftpm/xcode/package.xcworkspace"

permissions:
  contents: read

jobs:
  # Non-strict concurrency (default Swift / targeted mode)
  macOS:
    name: macOS
    runs-on: macos-26
    # Swift Testing recompiles a large @Test suite; fail clearly instead of looking hung.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@main
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Build
      run: |
        set -o pipefail
        xcodebuild build -workspace ".swiftpm/xcode/package.xcworkspace" -scheme "$SCHEME" -destination "generic/platform=macOS,name=Any Mac" | xcbeautify --renderer github-actions
    - name: Unit Tests
      # Do not pipe through xcbeautify: Swift Testing emits a large compile
      # diagnostic stream; piping it can stall the runner with no new log lines.
      # Plain `swift test` is the reliable SPM / Swift Testing path for CI.
      # `--no-parallel` is required: Swift Testing defaults to in-process parallel
      # runs; concurrent access to non-Sendable Foundation XML deadlocks the suite
      # (1000+ tests start, none finish). XCTest on main did not hit this.
      run: swift test --no-parallel

  # Strict concurrency: SWIFT_STRICT_CONCURRENCY=complete
  # (do not use OTHER_SWIFT_FLAGS here — it overrides per-target flags and
  #  strips the experimental "Lifetimes" feature from SwiftExtensions/SwiftTimecodeAV)
  # Build-only: compile-time Sendable checks. Full test execution is covered by the
  # macOS job (running the suite twice under xcodebuild was the slow/hang-prone path
  # after the XCTest → Swift Testing migration).
  macOS-swift6-strict-concurrency:
    name: macOS (strict concurrency)
    runs-on: macos-26
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@main
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Build with strict concurrency
      run: |
        set -o pipefail
        xcodebuild build -workspace ".swiftpm/xcode/package.xcworkspace" -scheme "$SCHEME" -destination "generic/platform=macOS,name=Any Mac" SWIFT_STRICT_CONCURRENCY=complete | xcbeautify --renderer github-actions

  # iOS Simulator build (no tests — tests require Foundation XML which is macOS-only)
  iOS:
    name: iOS
    runs-on: macos-26
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@main
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Prepare Device Simulator
      id: sim-setup
      uses: orchetect/setup-xcode-simulator@v1
      with:
        refresh: true
        download: true
        scheme: ${{ env.SCHEME }}
        target: iOS
    - name: Build
      run: |
        set -o pipefail
        xcodebuild build -skipMacroValidation -workspace "$WORKSPACEPATH" -scheme "$SCHEME" -destination "generic/platform=$PLATFORMSHORT" | xcbeautify --renderer github-actions
      env:
        PLATFORMSHORT: ${{ steps.sim-setup.outputs.platform-short }}
        WORKSPACEPATH: ${{ steps.sim-setup.outputs.workspace-path }}
